<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Scratch Browser CSS Demo</title>
    <link rel="stylesheet" href="/demo/styles.css" />
    <style>
      .hero strong {
        color: #8c2f39;
      }

      .hero > p {
        text-align: center;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Scratch Browser CSS Demo</h1>
      <p>
        This page mixes
        <strong>embedded CSS</strong>,
        <span style="color: #2a5db0; font-weight: bold;">inline style</span>,
        and an external stylesheet.
      </p>
      <div class="card">
        <p id="callout">
          Backgrounds, spacing, colors, and font sizes should look different now.
        </p>
        <p class="hidden">You should not see this line.</p>
      </div>
      <pre>preformatted
text stays
stacked</pre>
    </section>
  </body>
</html>
